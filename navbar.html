<script>
    // Función para actualizar el navbar según el estado de autenticación
    function actualizarNavbar() {
        const userMenu = document.getElementById('userMenu');
        const loginLink = document.getElementById('loginLink');
        const userName = document.getElementById('userName');
        const userEmail = document.getElementById('userEmail');
        
        // Verificar si hay usuario en sessionStorage
        const user = JSON.parse(sessionStorage.getItem('user') || '{}');
        
        if (user && user.email) {
            // Usuario autenticado
            if (userMenu) userMenu.style.display = 'block';
            if (loginLink) loginLink.style.display = 'none';
            if (userName) userName.textContent = user.nombre || user.email.split('@')[0];
            if (userEmail) userEmail.textContent = user.email;
        } else {
            // Usuario no autenticado
            if (userMenu) userMenu.style.display = 'none';
            if (loginLink) loginLink.style.display = 'block';
        }
    }

    // Función para ir al panel según el rol
    window.irAPanel = function() {
        const user = JSON.parse(sessionStorage.getItem('user') || '{}');
        if (user.rol === 'admin') {
            window.location.href = 'admin.html';
        } else if (user.rol === 'profesor') {
            window.location.href = 'profesor.html';
        } else if (user.rol === 'alumno') {
            window.location.href = 'alumno.html';
        } else {
            window.location.href = 'dashboard.html';
        }
    };

    // Función de logout
    window.logout = function() {
        if (typeof firebase !== 'undefined' && firebase.auth) {
            firebase.auth().signOut().then(() => {
                sessionStorage.clear();
                window.location.href = 'login.html';
            });
        } else {
            sessionStorage.clear();
            window.location.href = 'login.html';
        }
    };

    // Actualizar navbar cuando cargue la página
    document.addEventListener('DOMContentLoaded', function() {
        actualizarNavbar();
        
        // Marcar el enlace activo
        const currentPage = window.location.pathname.split('/').pop() || 'index.html';
        document.querySelectorAll('.navbar-nav .nav-link').forEach(link => {
            const href = link.getAttribute('href');
            if (href === currentPage || (currentPage === '' && href === 'index.html')) {
                link.classList.add('active');
            } else if (href.includes('#')) {
                // Para enlaces con hash en index.html
                if (currentPage === 'index.html' && window.location.hash === href.split('#')[1]) {
                    link.classList.add('active');
                }
            }
        });
    });
</script>
